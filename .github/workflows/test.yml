name: Test cases
on: [push]
jobs:
  lint:
    runs-on: ubutnu-latest
    setps:
      - name: Get Code from repository
        uses: actions/checkout@v3
      - name: Install Node JS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run : npm install
      - name: Run lint
        run : npm run lint
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Get code from repository
        uses: actions/checkout@v3
      - name: Install Node JS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run : npm install
      - name: Run tests
        run : npm test
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get code from repository
        uses: actions/checkout@v3
      - name:  Install Node JS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Deploy to production
        run: echo "Deploying..."
